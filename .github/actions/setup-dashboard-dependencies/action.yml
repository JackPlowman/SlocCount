name: "Setup Dashboard Dependencies"
description: "Installs dependencies for the dashboard."

runs:
  using: "composite"
  steps:
    - name: Set up Node.js with Cache
      uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
      with:
        node-version-file: "dashboard/package.json"
        cache: "npm"
        cache-dependency-path: "dashboard/package-lock.json"
    - name: Set up Just
      uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3.1.0
    - name: Install Dashboard Dependencies
      shell: bash
      run: just dashboard::ci
